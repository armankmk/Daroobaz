<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>داروباز | BighamLab Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        :root {
            --green-primary: #22c55e;
            --green-glow:    rgba(34, 197, 94, 0.35);
            --green-dim:     rgba(34, 197, 94, 0.12);
            --bg-dark:       #050f07;
            --bg-mid:        #0a1a0c;
            --glass-bg:      rgba(5, 20, 8, 0.75);
            --glass-border:  rgba(34, 197, 94, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: radial-gradient(ellipse at 40% 20%, #0a2010 0%, #050f07 60%, #000 100%);
            color: #e2ffe8;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }

        /* Animated background dots */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(34,197,94,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(34,197,94,0.06), inset 0 1px 0 rgba(34,197,94,0.1);
        }

        .prescription-paper {
            background: #f8fdf9;
            color: #0d1a0f;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(34,197,94,0.15);
            touch-action: none;
            user-select: none;
            transition: transform 0.08s ease-out;
        }
        .swipe-correct { border-right: 10px solid #22c55e !important; box-shadow: 0 20px 50px rgba(34,197,94,0.25) !important; }
        .swipe-wrong   { border-left:  10px solid #ef4444 !important; box-shadow: 0 20px 50px rgba(239,68,68,0.25) !important; }

        @keyframes pulse-red  { 0%,100% { background: transparent; } 50% { background: rgba(239,68,68,0.15); } }
        @keyframes glow-in    { from { opacity:0; transform:scale(0.92) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
        @keyframes float      { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }

        .logo-wrap {
            animation: float 4s ease-in-out infinite;
        }

        .support-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: #f0fdf4;
            font-weight: 800;
            padding: 13px 26px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 0.88rem;
            box-shadow: 0 4px 18px rgba(34,197,94,0.35), 0 0 0 1px rgba(134,239,172,0.2) inset;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .support-btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(34,197,94,0.5); background: linear-gradient(135deg, #22c55e, #16a34a); }
        .support-btn:active { transform: scale(0.95); }
        .support-btn .btn-icon { font-size: 1.15rem; }

        .start-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #052008;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(34,197,94,0.45);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .start-btn:hover  { box-shadow: 0 6px 28px rgba(34,197,94,0.6); transform: translateY(-1px); }
        .start-btn:active { transform: scale(0.97); }

        .name-input {
            background: rgba(5, 20, 8, 0.6);
            border: 1px solid rgba(34,197,94,0.25);
            color: #e2ffe8;
            caret-color: #22c55e;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .name-input:focus {
            border-color: rgba(34,197,94,0.6);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
            outline: none;
        }
        .name-input::placeholder { color: rgba(134,239,172,0.35); }

        .timer-val  { color: #4ade80; text-shadow: 0 0 12px rgba(74,222,128,0.5); }
        .round-val  { color: #86efac; }
        .feedback   { color: rgba(134,239,172,0.7); }

        .hint-bar { color: rgba(74,222,128,0.35); }

        .score-big { color: #4ade80; text-shadow: 0 0 24px rgba(74,222,128,0.5); }

        /* Rx watermark on prescription */
        .rx-watermark {
            position: absolute;
            bottom: 6px;
            right: 12px;
            font-size: 3.5rem;
            font-weight: 900;
            color: rgba(34,197,94,0.07);
            line-height: 1;
            pointer-events: none;
            font-style: italic;
        }
    </style>
</head>

    -->
    <script>
        // ─────────────────────────────────────────────────
        // NORMALIZER — handles all 3 schema variants:
        //   Type A: { dr, spec, patient, items:[{name,instruction}], isValid, error, teachingPoint }
        //   Type B: { dr, spec, items:[string], isValid, explanation }
        //   Type C: { drugs:[string], is_valid, note }  /  { items:[string], valid, scientific_note }
        // ─────────────────────────────────────────────────
        function normalizeCase(raw) {
            const isValid =
                raw.isValid    !== undefined ? raw.isValid :
                raw.valid      !== undefined ? raw.valid :
                raw.is_valid   !== undefined ? raw.is_valid : true;

            const errorNote =
                raw.error           ||
                raw.explanation     ||
                raw.teachingPoint   ||
                raw.scientific_note ||
                raw.note            || null;

            const src = Array.isArray(raw.items) ? raw.items : Array.isArray(raw.drugs) ? raw.drugs : [];
            const itemList = src.map(i =>
                typeof i === 'string' ? i : (i.name + (i.instruction ? ` — ${i.instruction}` : ''))
            );

            return {
                dr:      raw.dr   || 'پزشک معالج',
                spec:    raw.spec || raw.specialty || '',
                patient: raw.patient || raw.patientInfo || '',
                items:   itemList,
                isValid: Boolean(isValid),
                error:   errorNote
            };
        }

        // ─────────────────────────────────────────────────
        const CONFIG = { TOTAL_ROUNDS: 10, INITIAL_TIME: 360, PENALTY: 15, SWIPE_THRESHOLD: 80 };

        const Game = {
            state: { playerName: '', currentRound: 0, timeRemaining: CONFIG.INITIAL_TIME, score: 0, database: [] },

            start() {
                this.state.playerName  = document.getElementById('player-name').value || 'همکار گرامی';
                this.state.score       = 0;
                this.state.currentRound= 0;
                this.state.timeRemaining = CONFIG.INITIAL_TIME;

                const rawDB =
                    (typeof window.PRESCRIPTIONS   !== 'undefined' ? window.PRESCRIPTIONS   : null) ||
                    (typeof window.PRESCRIPTION_DB !== 'undefined' ? window.PRESCRIPTION_DB : null) ||
                    [
                        { dr:"دکتر آگاه",  spec:"داخلی",  patient:"بیمار ۴۵ ساله", items:[{name:"Tab Losartan 50mg"},{name:"Tab Spironolactone 25mg"}], isValid:false, error:"ریسک هایپرکالمی" },
                        { dr:"دکتر نمونه", spec:"عمومی",  patient:"بیمار ۳۰ ساله", items:[{name:"Tab Acetaminophen 500mg"},{name:"Tab Cetirizine 10mg"}], isValid:true, error:null }
                    ];

                this.state.database = rawDB.map(normalizeCase);
                this.shuffleDB();

                document.getElementById('screen-start').classList.add('hidden');
                document.getElementById('screen-play').classList.remove('hidden');
                this.startTimer();
                this.renderCard();
            },

            shuffleDB() {
                const db = this.state.database;
                for (let i = db.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [db[i], db[j]] = [db[j], db[i]];
                }
            },

            startTimer() {
                let lastTick = Date.now();
                this.timerInterval = setInterval(() => {
                    const now   = Date.now();
                    const delta = Math.floor((now - lastTick) / 1000);
                    if (delta >= 1) {
                        this.state.timeRemaining = Math.max(0, this.state.timeRemaining - delta);
                        lastTick = now;
                    }
                    const r    = this.state.timeRemaining;
                    const mins = Math.floor(r / 60).toString().padStart(2,'0');
                    const secs = (r % 60).toString().padStart(2,'0');
                    document.getElementById('timer').innerText = `${mins}:${secs}`;
                    if (r <= 0) this.endGame("زمان تموم شد دکتر!");
                }, 100);
            },

            renderCard() {
                if (this.state.currentRound >= CONFIG.TOTAL_ROUNDS) return this.endGame("شیفت تموم شد!");
                const data = this.state.database[this.state.currentRound % this.state.database.length];
                document.getElementById('round-count').innerText = `${this.state.currentRound + 1}/${CONFIG.TOTAL_ROUNDS}`;

                const card = document.createElement('div');
                card.className = 'prescription-paper w-[300px] h-[350px] p-6 absolute cursor-grab select-none overflow-hidden';

                const itemsHTML = data.items.slice(0, 5)
                    .map(i => `<li style="font-family:monospace;" class="text-sm leading-snug mb-1">◦ ${i}</li>`)
                    .join('');

                card.innerHTML = `
                    <div style="border-bottom:1px solid #d1fae5; padding-bottom:10px; margin-bottom:12px;">
                        <h3 style="font-weight:700; font-size:1rem; color:#0d4a1a;">${data.dr}</h3>
                        ${data.spec ? `<p style="font-size:0.75rem; color:#4b7a54;">${data.spec}</p>` : ''}
                    </div>
                    ${data.patient ? `<p style="font-size:0.82rem; font-weight:600; color:#1a4a22; margin-bottom:10px; line-height:1.4;">${data.patient}</p>` : ''}
                    <ul style="list-style:none; margin-bottom:12px;">${itemsHTML}</ul>
                    <div class="rx-watermark">Rx</div>
                    <div style="position:absolute; bottom:10px; left:12px; font-size:9px; color:rgba(34,197,94,0.3);">BighamLab Edition</div>
                `;

                this.initSwipe(card, data.isValid, data.error);
                const container = document.getElementById('card-container');
                container.innerHTML = '';
                container.appendChild(card);
            },

            initSwipe(el, isValid, errorMsg) {
                let startX = 0, currentX = 0;

                const move = (e) => {
                    const px = e.pageX ?? e.touches?.[0]?.pageX ?? startX;
                    currentX = px - startX;
                    el.style.transform = `translateX(${currentX}px) rotate(${currentX/15}deg)`;
                    el.className = `prescription-paper w-[300px] h-[350px] p-6 absolute overflow-hidden ${
                        currentX > 20 ? 'swipe-correct' : currentX < -20 ? 'swipe-wrong' : ''
                    }`;
                };

                const end = () => {
                    document.removeEventListener('pointermove', move);
                    if (Math.abs(currentX) > CONFIG.SWIPE_THRESHOLD) {
                        this.processAnswer((currentX > 0) === isValid, errorMsg);
                    } else {
                        el.style.transform = 'translateX(0) rotate(0)';
                        el.className = 'prescription-paper w-[300px] h-[350px] p-6 absolute overflow-hidden';
                    }
                };

                el.addEventListener('pointerdown', (e) => {
                    startX  = e.pageX ?? e.touches?.[0]?.pageX ?? 0;
                    currentX = 0;
                    document.addEventListener('pointermove', move);
                    document.addEventListener('pointerup', end, {once:true});
                });
            },

            processAnswer(isCorrect, errorMsg) {
                const feedbackEl = document.getElementById('feedback-text');
                if (isCorrect) {
                    this.state.score++;
                    feedbackEl.innerText = ["عالی دکتر!", "دقیقاً!", "صحیح!"][Math.floor(Math.random()*3)];
                    feedbackEl.style.color = '#4ade80';
                } else {
                    this.state.timeRemaining = Math.max(0, this.state.timeRemaining - CONFIG.PENALTY);
                    const hint = errorMsg
                        ? errorMsg.substring(0,45) + (errorMsg.length > 45 ? '…' : '')
                        : ["خطرناکه دکتر!", "تداخل!", "اشتباه!"][Math.floor(Math.random()*3)];
                    feedbackEl.innerText = hint;
                    feedbackEl.style.color = '#f87171';
                }
                this.state.currentRound++;
                setTimeout(() => this.renderCard(), 150);
            },

            endGame(msg) {
                clearInterval(this.timerInterval);
                document.getElementById('screen-play').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                const s = this.state.score;
                const verdict =
                    s >= 9 ? '🏆 استاد داروساز!' :
                    s >= 7 ? '👍 عالی بود!' :
                    s >= 5 ? '📖 نیاز به مرور داری.' :
                             '⚠️ مطالعه بیشتر لازمه.';
                document.getElementById('result-content').innerHTML = `
                    <p style="color:rgba(134,239,172,0.6); margin-bottom:8px;">${msg}</p>
                    <div class="text-6xl font-black my-4 score-big">${s}/${CONFIG.TOTAL_ROUNDS}</div>
                    <p style="font-size:1.1rem; color:#86efac;">${verdict}</p>
                `;
            }
        };
    </script>
</body>
</html>
