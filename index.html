<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>داروباز | BighamLab Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: radial-gradient(circle at center, #1e293b, #0f172a); color: #f8fafc; overflow: hidden; touch-action: none; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .prescription-paper { background: #ffffff; color: #1e293b; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); touch-action: none; user-select: none; transition: transform 0.1s ease-out; }
        .swipe-correct { border-right: 12px solid #22c55e !important; }
        .swipe-wrong { border-left: 12px solid #ef4444 !important; }
        .penalty-flash { animation: pulse-red 0.5s ease-out; }
        @keyframes pulse-red { 0% { background-color: rgba(239, 68, 68, 0); } 50% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center p-4">

    <!-- Screen Start -->
    <div id="screen-start" class="w-full max-w-sm glass-card rounded-3xl p-8 text-center z-50">
        <h1 class="text-4xl font-black mb-2 text-blue-400">داروباز</h1>
        <p class="text-slate-400 text-sm mb-8">BighamLab Edition v1.0</p>
        <input type="text" id="player-name" placeholder="نام دکتر؟" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 mb-6 text-center focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        <button onclick="Game.start()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95">شروع شیفت کاری</button>
        <a href="https://zarinp.al/bighamlab" target="_blank" class="mt-6 block text-yellow-500 text-sm hover:underline">☕ حمایت از BighamLab</a>
    </div>

    <!-- Screen Play -->
    <div id="screen-play" class="hidden w-full max-w-sm h-full flex flex-col pt-8">
        <div class="flex justify-between items-center mb-6 glass-card p-4 rounded-2xl">
            <div><span class="text-xs text-slate-400 block">زمان</span><span id="timer" class="text-xl font-mono text-yellow-400">06:00</span></div>
            <div id="feedback-text" class="text-sm italic text-slate-400 truncate max-w-[150px]">آماده‌باش دکتر!</div>
            <div><span class="text-xs text-slate-400 block">مرحله</span><span id="round-count" class="text-xl font-bold text-blue-400">1/10</span></div>
        </div>
        <div id="card-container" class="relative flex-grow flex items-center justify-center"></div>
        <div class="flex justify-between px-4 py-8 opacity-50 text-sm"><span>← تداخل</span><span>تایید →</span></div>
    </div>

    <!-- Screen Result -->
    <div id="screen-result" class="hidden w-full max-w-sm glass-card rounded-3xl p-8 text-center">
        <h2 class="text-2xl font-bold mb-4">پایان شیفت</h2>
        <div id="result-content" class="my-8"></div>
        <button onclick="location.reload()" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl">شروع مجدد</button>
        <p class="text-[10px] mt-6 opacity-30">BighamLab Architecture</p>
    </div>

    <script>
        const CONFIG = { TOTAL_ROUNDS: 10, INITIAL_TIME: 360, PENALTY: 15, SWIPE_THRESHOLD: 80 };
        const Game = {
            state: { playerName: '', currentRound: 0, timeRemaining: CONFIG.INITIAL_TIME, score: 0, database: [] },
            
            async start() {
                this.state.playerName = document.getElementById('player-name').value || 'همکار گرامی';
                // Load DB: Prefer external, fallback to internal
                this.state.database = (typeof window.PRESCRIPTION_DB !== 'undefined') ? window.PRESCRIPTION_DB : [
                    {dr:"دکتر آگاه", spec:"داخلی", patient:"بیمار ۴۵ ساله", items:["Tab Losartan", "Tab Spironolactone"], isValid:false, error: "ریسک هایپرکالمی"},
                    {dr:"دکتر نمونه", spec:"عمومی", patient:"بیمار ۳۰ ساله", items:["Tab Acetaminophen", "Syr Diphenhydramine"], isValid:true, error: ""}
                ];
                this.shuffleDB();
                document.getElementById('screen-start').classList.add('hidden');
                document.getElementById('screen-play').classList.remove('hidden');
                this.startTimer();
                this.renderCard();
            },

            shuffleDB() {
                for (let i = this.state.database.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.state.database[i], this.state.database[j]] = [this.state.database[j], this.state.database[i]];
                }
            },

            startTimer() {
                const start = Date.now();
                this.timerInterval = setInterval(() => {
                    const remaining = Math.max(0, CONFIG.INITIAL_TIME - Math.floor((Date.now() - start)/1000));
                    this.state.timeRemaining = remaining;
                    const mins = Math.floor(remaining / 60).toString().padStart(2, '0');
                    const secs = (remaining % 60).toString().padStart(2, '0');
                    document.getElementById('timer').innerText = `${mins}:${secs}`;
                    if (remaining <= 0) this.endGame("زمان تموم شد دکتر!");
                }, 100);
            },

            renderCard() {
                if (this.state.currentRound >= CONFIG.TOTAL_ROUNDS) return this.endGame("شیفت تموم شد!");
                const data = this.state.database[this.state.currentRound % this.state.database.length];
                document.getElementById('round-count').innerText = `${this.state.currentRound + 1}/${CONFIG.TOTAL_ROUNDS}`;
                const card = document.createElement('div');
                card.className = 'prescription-paper w-[300px] h-[350px] p-6 absolute cursor-grab select-none';
                card.innerHTML = `<div class="border-b border-gray-300 pb-2 mb-4"><h3 class="font-bold">${data.dr}</h3><p class="text-xs opacity-70">${data.spec}</p></div><p class="text-sm font-bold mb-4">${data.patient}</p><ul class="space-y-2">${data.items.map(i => `<li class="font-mono text-lg">◦ ${i}</li>`).join('')}</ul><div class="absolute bottom-4 left-4 text-[10px] opacity-30">BighamLab Edition</div>`;
                this.initSwipe(card, data.isValid);
                const container = document.getElementById('card-container');
                container.innerHTML = ''; container.appendChild(card);
            },

            initSwipe(el, isValid) {
                let startX, currentX;
                const move = (e) => {
                    currentX = (e.pageX || e.touches[0].pageX) - startX;
                    el.style.transform = `translateX(${currentX}px) rotate(${currentX/15}deg)`;
                    el.className = `prescription-paper w-[300px] h-[350px] p-6 absolute ${currentX > 20 ? 'swipe-correct' : currentX < -20 ? 'swipe-wrong' : ''}`;
                };
                const end = () => {
                    document.removeEventListener('pointermove', move);
                    if (Math.abs(currentX) > CONFIG.SWIPE_THRESHOLD) {
                        const isCorrect = (currentX > 0) === isValid;
                        this.processAnswer(isCorrect);
                    } else { el.style.transform = 'translateX(0) rotate(0)'; el.className = 'prescription-paper w-[300px] h-[350px] p-6 absolute'; }
                };
                el.addEventListener('pointerdown', (e) => { startX = e.pageX || e.touches[0].pageX; document.addEventListener('pointermove', move); document.addEventListener('pointerup', end, {once:true}); });
            },

            processAnswer(isCorrect) {
                const feedbackEl = document.getElementById('feedback-text');
                if (isCorrect) {
                    this.state.score++;
                    feedbackEl.innerText = ["عالی دکتر!", "دقیقه!", "صحیح!"].sort(()=>0.5-Math.random())[0];
                    feedbackEl.style.color = "#22c55e";
                } else {
                    this.state.timeRemaining -= CONFIG.PENALTY;
                    feedbackEl.innerText = ["خطرناکه دکتر!", "تداخل!", "اشتباه!"].sort(()=>0.5-Math.random())[0];
                    feedbackEl.style.color = "#ef4444";
                }
                this.state.currentRound++;
                this.renderCard();
            },

            endGame(msg) {
                clearInterval(this.timerInterval);
                document.getElementById('screen-play').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');
                document.getElementById('result-content').innerHTML = `<p>${msg}</p><div class="text-6xl font-black my-6">${this.state.score}/10</div><p>${this.state.score > 7 ? 'استاد داروساز!' : 'نیاز به مطالعه بیشتر.'}</p>`;
            }
        };
    </script>
</body>
</html>
